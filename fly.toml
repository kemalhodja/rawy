app = "rawy-app"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  WHISPER_MODEL = "base"
  WHISPER_DEVICE = "cpu"
  WHISPER_COMPUTE_TYPE = "int8"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
