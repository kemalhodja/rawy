<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Rawy - Voice-first Knowledge OS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root { --bg: #0A0A0A; --fg: #fff; --accent: #14B8A6; --muted: rgba(255,255,255,0.6); --danger: #ef4444; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--fg); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .container { max-width: 500px; margin: 0 auto; padding: 1.5rem 1rem; }
    .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .brand { text-align: center; margin-bottom: 2rem; position: relative; }
    .brand h1 { font-size: 2rem; margin-bottom: 0.5rem; font-weight: 700; letter-spacing: -0.02em; }
    .brand p { color: var(--muted); font-size: 0.875rem; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .tab { flex: 1; padding: 0.875rem; background: transparent; border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; color: var(--muted); cursor: pointer; font-size: 0.9375rem; font-weight: 500; transition: all 0.2s; }
    .tab.active { background: rgba(20,184,166,0.15); border-color: var(--accent); color: var(--fg); }
    input, textarea { width: 100%; padding: 1rem 1.25rem; margin-bottom: 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: var(--fg); font-size: 1rem; transition: all 0.2s; }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); background: rgba(255,255,255,0.08); }
    button[type="submit"] { width: 100%; padding: 1rem; background: var(--accent); color: #000; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: var(--danger); margin-top: 0.75rem; font-size: 0.875rem; padding: 0.5rem; background: rgba(239,68,68,0.1); border-radius: 8px; }
    .hidden { display: none !important; }
    .nav { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 0.5rem; overflow-x: auto; }
    .nav-btn { flex: 1; padding: 0.875rem; background: transparent; border: none; color: var(--muted); cursor: pointer; border-radius: 10px; font-size: 0.9375rem; font-weight: 500; transition: all 0.2s; position: relative; white-space: nowrap; }
    .nav-btn.active { color: var(--fg); }
    .nav-btn.active::after { content: ''; position: absolute; bottom: -0.5rem; left: 25%; right: 25%; height: 2px; background: var(--accent); border-radius: 2px; }
    .panel { display: none; animation: fadeIn 0.3s ease; }
    .panel.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .record-btn { width: 120px; height: 120px; border-radius: 50%; background: var(--accent); border: none; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; cursor: pointer; box-shadow: 0 0 60px rgba(20,184,166,0.4); transition: all 0.3s; position: relative; }
    .record-btn.recording { background: var(--danger); box-shadow: 0 0 60px rgba(239,68,68,0.5); animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)}50%{transform:scale(1.05)} }
    .record-inner { width: 48px; height: 48px; background: var(--bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
    .item { background: rgba(255,255,255,0.04); padding: 1rem 1.25rem; border-radius: 12px; margin-bottom: 0.875rem; border: 1px solid rgba(255,255,255,0.08); cursor: pointer; transition: all 0.2s; }
    .item:hover { background: rgba(255,255,255,0.08); border-color: rgba(20,184,166,0.3); }
    .item h4 { font-size: 1rem; font-weight: 500; margin-bottom: 0.375rem; display: flex; align-items: center; gap: 0.5rem; }
    .item h4 .badge { font-size: 0.625rem; padding: 0.125rem 0.375rem; background: rgba(20,184,166,0.2); color: var(--accent); border-radius: 4px; text-transform: uppercase; }
    .item p { color: var(--muted); font-size: 0.875rem; line-height: 1.4; }
    .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; width: 100%; max-width: 500px; max-height: 90vh; overflow: hidden; }
    .modal-header { padding: 1.25rem; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-between; align-items: center; }
    .modal-close { background: none; border: none; color: var(--muted); font-size: 1.5rem; cursor: pointer; }
    .modal-body { padding: 1.25rem; overflow-y: auto; max-height: 60vh; }
    .modal-footer { padding: 1rem 1.25rem; border-top: 1px solid rgba(255,255,255,0.08); display: flex; gap: 0.75rem; }
    .modal-btn { flex: 1; padding: 0.875rem; border-radius: 10px; border: none; font-size: 0.9375rem; font-weight: 500; cursor: pointer; }
    .modal-btn.primary { background: var(--accent); color: #000; }
    .modal-btn.secondary { background: rgba(255,255,255,0.05); color: var(--fg); border: 1px solid rgba(255,255,255,0.1); }
    .transcript-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 1rem; font-size: 0.9375rem; line-height: 1.6; min-height: 100px; white-space: pre-wrap; }
    .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(30,30,30,0.95); color: var(--fg); padding: 0.875rem 1.5rem; border-radius: 10px; font-size: 0.9375rem; opacity: 0; transition: all 0.3s; z-index: 200; border: 1px solid rgba(255,255,255,0.1); }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .workspace-selector { display: flex; gap: 0.5rem; margin-bottom: 1rem; overflow-x: auto; }
    .workspace-chip { padding: 0.5rem 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; font-size: 0.875rem; cursor: pointer; white-space: nowrap; }
    .workspace-chip.active { background: var(--accent); color: #000; border-color: var(--accent); }
    .graph-container { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; height: 300px; position: relative; overflow: hidden; margin-bottom: 1rem; }
    .graph-placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--muted); }
    .link-line { stroke: var(--accent); stroke-width: 2; opacity: 0.5; }
    .link-node { fill: var(--accent); }
    .backlinks { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); }
    .backlinks h4 { color: var(--accent); margin-bottom: 0.75rem; font-size: 0.875rem; }
    .action-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 0.5rem; }
    .action-item input[type="checkbox"] { width: 18px; height: 18px; margin: 0; }
    .status-badge { display: inline-block; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 500; text-transform: uppercase; }
    .status-scheduled { background: rgba(251,191,36,0.2); color: #fbbf24; }
    .status-completed { background: rgba(20,184,166,0.2); color: var(--accent); }
    .status-recording { background: rgba(239,68,68,0.2); color: var(--danger); }
    .invite-box { background: rgba(20,184,166,0.1); border: 1px solid rgba(20,184,166,0.3); border-radius: 8px; padding: 1rem; margin: 1rem 0; }
    .invite-box code { display: block; font-size: 0.75rem; margin-top: 0.5rem; word-break: break-all; color: var(--accent); }
    .logout { position: absolute; top: 0; right: 0; padding: 0.5rem 0.875rem; background: transparent; border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: var(--muted); font-size: 0.8125rem; cursor: pointer; }
    .logout:hover { color: var(--danger); border-color: var(--danger); }
  </style>
</head>
<body>
  <div id="loading" class="loading-overlay"><div class="spinner"></div></div>
  <div class="container">
    <div id="auth-view" class="hidden">
      <div class="brand"><h1>Rawy</h1><p>Voice-first knowledge</p></div>
      <div class="tabs">
        <button class="tab active" onclick="showTab('login')">Giris</button>
        <button class="tab" onclick="showTab('register')">Kayit</button>
      </div>
      <form id="login-form" onsubmit="return doLogin(event)">
        <input type="email" id="login-email" placeholder="Email" value="test2@rawy.app" required>
        <input type="password" id="login-pass" placeholder="Sifre" value="Test12345!" required>
        <button type="submit" id="login-btn">Giris Yap</button>
        <div id="login-error" class="error hidden"></div>
      </form>
      <form id="register-form" class="hidden" onsubmit="return doRegister(event)">
        <input type="email" id="reg-email" placeholder="Email" required>
        <input type="password" id="reg-pass" placeholder="Sifre (min 6)" minlength="6" required>
        <button type="submit" id="reg-btn">Kayit Ol</button>
        <div id="reg-error" class="error hidden"></div>
      </form>
    </div>
    <div id="app-view" class="hidden">
      <button class="logout" onclick="doLogout()">Cikis</button>
      <div class="brand"><h1>Rawy</h1><p id="user-info">-</p></div>
      <div class="nav">
        <button class="nav-btn active" onclick="showPanel('calendar')">Ajanda</button>
        <button class="nav-btn" onclick="showPanel('voice')">Sesler</button>
        <button class="nav-btn" onclick="showPanel('graph')">Graph</button>
        <button class="nav-btn" onclick="showPanel('workspace')">Takim</button>
        <button class="nav-btn" onclick="showPanel('meetings')">Toplanti</button>
      </div>
      <div id="workspace-selector" class="workspace-selector hidden"></div>
      <div id="calendar-panel" class="panel active"><div class="panel-header"><h2>Ajanda</h2><button class="modal-btn secondary" onclick="refreshData()">Yenile</button></div><div id="calendar-list"><div class="empty"><div class="empty-icon">📅</div><p>Yukleniyor...</p></div></div></div>
      <div id="voice-panel" class="panel"><div class="recorder-container"><button class="record-btn" id="rec-btn" onmousedown="startRec()" onmouseup="stopRec()" ontouchstart="startRec()" ontouchend="stopRec()"><div class="record-inner">🎙️</div></button><p class="rec-hint">Basili tut, konus, birak</p><div id="status"></div></div><div id="voice-list"></div></div>
      <div id="graph-panel" class="panel"><div class="panel-header"><h2>Knowledge Graph</h2></div><div class="graph-container" id="graph-viz"><div class="graph-placeholder">Graph yukleniyor...</div></div><div id="related-notes"></div></div>
      <div id="workspace-panel" class="panel"><div class="panel-header"><h2>Takimlar</h2><button class="modal-btn primary" onclick="showCreateWorkspace()">+ Yeni</button></div><div id="workspace-list"><div class="empty"><p>Takimlar yukleniyor...</p></div></div></div>
      <div id="meetings-panel" class="panel"><div class="panel-header"><h2>Toplantilar</h2><button class="modal-btn primary" onclick="showCreateMeeting()">+ Planla</button></div><div id="meetings-list"><div class="empty"><p>Toplantilar yukleniyor...</p></div></div></div>
    </div>
  </div>
  <div id="modal" class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-header"><h3 id="modal-title">Detay</h3><button class="modal-close" onclick="closeModal()">&times;</button></div><div class="modal-body" id="modal-body"></div><div class="modal-footer" id="modal-footer"></div></div></div>
  <div id="toast" class="toast"></div>
  <script>
    const API = window.location.origin;
    let token = localStorage.getItem('token');
    let currentWorkspace = localStorage.getItem('currentWorkspace');
    let recorder = null, chunks = [];
    window.onload = () => { setTimeout(() => { document.getElementById('loading').classList.add('hidden'); if(token) showApp(); else showAuth(); }, 500); };
    function showToast(msg, type='success') { const t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast show ' + type; setTimeout(() => t.classList.remove('show'), 3000); }
    function showAuth() { document.getElementById('auth-view').classList.remove('hidden'); document.getElementById('app-view').classList.add('hidden'); }
    async function showApp() { document.getElementById('auth-view').classList.add('hidden'); document.getElementById('app-view').classList.remove('hidden'); try { const res = await fetch(API + '/auth/me', {headers: {'Authorization': 'Bearer ' + token}}); const user = await res.json(); document.getElementById('user-info').textContent = user.email + ' · ' + user.plan; } catch(e) {} loadWorkspaces(); loadCalendar(); loadVoices(); loadGraph(); loadMeetings(); }
    function showTab(tab) { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); event.target.classList.add('active'); document.getElementById('login-form').classList.toggle('hidden', tab !== 'login'); document.getElementById('register-form').classList.toggle('hidden', tab !== 'register'); }
    function showPanel(panel) { document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); document.getElementById(panel + '-panel').classList.add('active'); }
    async function doLogin(e) { e.preventDefault(); try { const res = await fetch(API + '/auth/login', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email: document.getElementById('login-email').value, password: document.getElementById('login-pass').value})}); if(!res.ok) throw new Error('Hata'); const data = await res.json(); token = data.access_token; localStorage.setItem('token', token); showToast('Giris basarili!'); showApp(); } catch(err) { document.getElementById('login-error').textContent = 'Giris basarisiz'; document.getElementById('login-error').classList.remove('hidden'); } return false; }
    async function doRegister(e) { e.preventDefault(); try { let res = await fetch(API + '/auth/register', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email: document.getElementById('reg-email').value, password: document.getElementById('reg-pass').value})}); if(!res.ok) throw new Error(); res = await fetch(API + '/auth/login', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email: document.getElementById('reg-email').value, password: document.getElementById('reg-pass').value})}); const data = await res.json(); token = data.access_token; localStorage.setItem('token', token); showToast('Kayit basarili!'); showApp(); } catch(err) { document.getElementById('reg-error').textContent = 'Kayit basarisiz'; document.getElementById('reg-error').classList.remove('hidden'); } return false; }
    function doLogout() { token = null; localStorage.removeItem('token'); location.reload(); }
    async function loadCalendar() { const list = document.getElementById('calendar-list'); try { const res = await fetch(API + '/calendar/', {headers: {'Authorization': 'Bearer ' + token}}); const data = await res.json(); const days = Array.isArray(data) ? data : (data.days || []); if(!days.length) { list.innerHTML = '<div class="empty"><div class="empty-icon">📅</div><p>Ajanda bos</p></div>'; return; } list.innerHTML = days.slice(0, 7).map(d => `<div class="item"><h4>${new Date(d.date).toLocaleDateString('tr-TR', {weekday:'long', day:'numeric', month:'short'})}</h4>${(d.blocks || []).length ? (d.blocks || []).map(b => `<p>${(b.start_time || '--:--').slice(0,5)} — ${b.title}</p>`).join('') : '<p style="color:var(--muted)">Blok yok</p>'}</div>`).join(''); } catch(e) { list.innerHTML = '<div class="empty"><p>Hata</p></div>'; } }
    async function loadVoices() { const list = document.getElementById('voice-list'); try { const res = await fetch(API + '/voice/', {headers: {'Authorization': 'Bearer ' + token}}); const data = await res.json(); const items = data.items || []; if(!items.length) { list.innerHTML = '<div class="empty"><div class="empty-icon">🎤</div><p>Henüz ses kaydi yok</p></div>'; return; } list.innerHTML = items.slice(0, 10).map(v => `<div class="item" onclick="showNoteDetail(${v.id})"><h4>${v.title || 'Isimsiz Not'} ${v.is_processed ? '<span class="badge">Hazir</span>' : ''}</h4><p>${v.preview || 'Transkript isleniyor...'}</p><small>${new Date(v.created_at).toLocaleString('tr-TR')}</small></div>`).join(''); } catch(e) { list.innerHTML = '<div class="empty"><p>Hata</p></div>'; } }
    async function showNoteDetail(id) { try { const res = await fetch(API + '/voice/' + id, {headers: {'Authorization': 'Bearer ' + token}}); const note = await res.json(); let backlinksHtml = ''; if(note.id) { const linksRes = await fetch(API + '/graph/backlinks/' + id, {headers: {'Authorization': 'Bearer ' + token}}); const links = await linksRes.json(); if(links && links.length) { backlinksHtml = '<div class="backlinks"><h4>Bu nota bagli diger notlar:</h4>' + links.map(l => `<div class="item" onclick="showNoteDetail(${l.note_id})">${l.title}</div>`).join('') + '</div>'; } } document.getElementById('modal-title').textContent = note.title || 'Not Detayi'; document.getElementById('modal-body').innerHTML = `<div class="transcript-box">${note.transcript || 'Transkript yok'}</div>${backlinksHtml}`; document.getElementById('modal-footer').innerHTML = '<button class="modal-btn secondary" onclick="closeModal()">Kapat</button><button class="modal-btn primary" onclick="copyToClipboard(\'' + (note.transcript || '').replace(/'/g, "\\'") + '\')">Kopyala</button>'; document.getElementById('modal').classList.add('active'); } catch(e) { showToast('Not yuklenemedi', 'error'); } }
    async function loadGraph() { const container = document.getElementById('graph-viz'); try { const res = await fetch(API + '/graph', {headers: {'Authorization': 'Bearer ' + token}}); const data = await res.json(); if(!data.nodes || !data.nodes.length) { container.innerHTML = '<div class="graph-placeholder">Henüz not baglantisi yok</div>'; document.getElementById('related-notes').innerHTML = ''; return; } const width = container.offsetWidth; const height = 300; const nodes = data.nodes.map((n, i) => ({...n, x: width/2 + Math.cos(i * 2 * Math.PI / data.nodes.length) * 80, y: height/2 + Math.sin(i * 2 * Math.PI / data.nodes.length) * 80})); let svg = `<svg width="${width}" height="${height}">`; data.edges.forEach(e => { const s = nodes.find(n => n.id === e.source); const t = nodes.find(n => n.id === e.target); if(s && t) svg += `<line class="link-line" x1="${s.x}" y1="${s.y}" x2="${t.x}" y2="${t.y}" />`; }); nodes.forEach(n => { svg += `<circle class="link-node" cx="${n.x}" cy="${n.y}" r="8" onclick="showNoteDetail(${n.id})"/><text x="${n.x}" y="${n.y + 20}" fill="#fff" font-size="10" text-anchor="middle">${(n.title || '').slice(0, 10)}</text>`; }); svg += '</svg>'; container.innerHTML = svg; const related = document.getElementById('related-notes'); related.innerHTML = '<h4 style="margin:1rem 0;color:var(--accent)">Notlariniz:</h4>' + nodes.slice(0, 5).map(n => `<div class="item" onclick="showNoteDetail(${n.id})">${n.title}</div>`).join(''); } catch(e) { container.innerHTML = '<div class="graph-placeholder">Graph yuklenemedi</div>'; } }
    async function loadWorkspaces() { const list = document.getElementById('workspace-list'); const selector = document.getElementById('workspace-selector'); try { const res = await fetch(API + '/workspaces', {headers: {'Authorization': 'Bearer ' + token}}); const data = await res.json(); const workspaces = data.value || data || []; if(!workspaces.length) { list.innerHTML = '<div class="empty"><p>Henüz takim yok. Yeni olusturun!</p></div>'; selector.classList.add('hidden'); return; } list.innerHTML = workspaces.map(w => `<div class="item"><h4>${w.name} ${w.is_owner ? '<span class="badge">Owner</span>' : ''}</h4><p>/${w.slug}</p>${w.invite_token ? `<div class="invite-box">Davet Linki:<code>${API}/workspaces/join/${w.invite_token}</code></div>` : ''}</div>`).join(''); selector.classList.remove('hidden'); selector.innerHTML = '<div class="workspace-chip active" onclick="selectWorkspace(null)">Kisisel</div>' + workspaces.map(w => `<div class="workspace-chip ${currentWorkspace == w.id ? 'active' : ''}" onclick="selectWorkspace(${w.id})">${w.name}</div>`).join(''); } catch(e) { list.innerHTML = '<div class="empty"><p>Hata</p></div>'; } }
    function selectWorkspace(id) { currentWorkspace = id; if(id) localStorage.setItem('currentWorkspace', id); else localStorage.removeItem('currentWorkspace'); document.querySelectorAll('.workspace-chip').forEach(c => c.classList.remove('active')); event.target.classList.add('active'); showToast(id ? 'Takim secildi' : 'Kisisel alan'); }
    function showCreateWorkspace() { document.getElementById('modal-title').textContent = 'Yeni Takim'; document.getElementById('modal-body').innerHTML = '<input type="text" id="ws-name" placeholder="Takim adi"><input type="text" id="ws-desc" placeholder="Aciklama (opsiyonel)">'; document.getElementById('modal-footer').innerHTML = '<button class="modal-btn secondary" onclick="closeModal()">Iptal</button><button class="modal-btn primary" onclick="createWorkspace()">Olustur</button>'; document.getElementById('modal').classList.add('active'); }
    async function createWorkspace() { const name = document.getElementById('ws-name').value; if(!name) return; try { await fetch(API + '/workspaces', {method: 'POST', headers: {'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json'}, body: JSON.stringify({name, description: document.getElementById('ws-desc').value})}); closeModal(); showToast('Takim olusturuldu!'); loadWorkspaces(); } catch(e) { showToast('Hata', 'error'); } }
    async function loadMeetings() { const list = document.getElementById('meetings-list'); try { const res = await fetch(API + '/meetings', {headers: {'Authorization': 'Bearer ' + token}}); const data = await res.json(); const items = data.value || data || []; if(!items.length) { list.innerHTML = '<div class="empty"><div class="empty-icon">📹</div><p>Henüz toplanti yok</p></div>'; return; } list.innerHTML = items.map(m => `<div class="item" onclick="showMeetingDetail(${m.id})"><h4>${m.title} <span class="status-badge status-${m.status}">${m.status}</span></h4><p>${new Date(m.scheduled_at).toLocaleString('tr-TR')}</p>${m.action_count ? `<small>${m.action_count} gorev</small>` : ''}</div>`).join(''); } catch(e) { list.innerHTML = '<div class="empty"><p>Hata</p></div>'; } }
    function showCreateMeeting() { document.getElementById('modal-title').textContent = 'Toplanti Planla'; document.getElementById('modal-body').innerHTML = '<input type="text" id="mt-title" placeholder="Toplanti basligi"><input type="datetime-local" id="mt-time"><input type="url" id="mt-url" placeholder="Meet/Zoom linki (opsiyonel)">'; document.getElementById('modal-footer').innerHTML = '<button class="modal-btn secondary" onclick="closeModal()">Iptal</button><button class="modal-btn primary" onclick="createMeeting()">Planla</button>'; document.getElementById('modal').classList.add('active'); }
    async function createMeeting() { const title = document.getElementById('mt-title').value; const time = document.getElementById('mt-time').value; if(!title || !time) return; try { await fetch(API + '/meetings', {method: 'POST', headers: {'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json'}, body: JSON.stringify({title, scheduled_at: new Date(time).toISOString(), meeting_url: document.getElementById('mt-url').value})}); closeModal(); showToast('Toplanti planlandi!'); loadMeetings(); } catch(e) { showToast('Hata', 'error'); } }
    async function showMeetingDetail(id) { try { const res = await fetch(API + '/meetings/' + id, {headers: {'Authorization': 'Bearer ' + token}}); const m = await res.json(); let actionsHtml = ''; if(m.action_items && m.action_items.length) { actionsHtml = '<h4 style="margin:1rem 0;color:var(--accent)">Gorevler:</h4>' + m.action_items.map(a => `<div class="action-item"><input type="checkbox" ${a.completed ? 'checked' : ''}><div><p>${a.task}</p>${a.assignee ? `<small>${a.assignee}</small>` : ''}</div></div>`).join(''); } document.getElementById('modal-title').textContent = m.title; document.getElementById('modal-body').innerHTML = `<p><strong>Zaman:</strong> ${new Date(m.scheduled_at).toLocaleString('tr-TR')}</p><p><strong>Durum:</strong> ${m.status}</p>${m.summary ? `<div class="transcript-box" style="margin-top:1rem">${m.summary}</div>` : ''}${actionsHtml}`; document.getElementById('modal-footer').innerHTML = '<button class="modal-btn secondary" onclick="closeModal()">Kapat</button>'; document.getElementById('modal').classList.add('active'); } catch(e) {} }
    async function startRec() { const btn = document.getElementById('rec-btn'); const status = document.getElementById('status'); try { const stream = await navigator.mediaDevices.getUserMedia({audio: true}); recorder = new MediaRecorder(stream); chunks = []; recorder.ondataavailable = e => chunks.push(e.data); recorder.onstop = async () => { const blob = new Blob(chunks, {type: 'audio/webm'}); status.textContent = 'Yukleniyor...'; try { const formData = new FormData(); formData.append('file', blob, 'kayit.webm'); await fetch(API + '/voice/upload', {method: 'POST', headers: {'Authorization': 'Bearer ' + token}, body: formData}); status.textContent = ''; showToast('Kayit yuklendi!'); setTimeout(loadVoices, 500); setTimeout(loadGraph, 1000); } catch(err) { status.textContent = 'Hata!'; showToast('Yukleme basarisiz', 'error'); } }; recorder.start(); btn.classList.add('recording'); status.textContent = 'Kaydediyor...'; } catch(err) { showToast('Mikrofon erisimi yok', 'error'); } }
    function stopRec() { const btn = document.getElementById('rec-btn'); if(recorder && recorder.state === 'recording') { recorder.stop(); btn.classList.remove('recording'); recorder.stream.getTracks().forEach(t => t.stop()); } }
    function closeModal() { document.getElementById('modal').classList.remove('active'); }
    function copyToClipboard(text) { navigator.clipboard.writeText(text).then(() => showToast('Kopyalandi!')); }
    function refreshData() { loadCalendar(); loadVoices(); loadGraph(); loadMeetings(); showToast('Yenilendi'); }
    document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeModal(); });
  </script>
</body>
