<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="theme-color" content="#14B8A6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192x192.png">
  <title>Rawy - Voice Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root { --bg: #0A0A0A; --fg: #fff; --accent: #14B8A6; --muted: rgba(255,255,255,0.6); --danger: #ef4444; --widget-size: 72px; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--fg); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .container { max-width: 500px; margin: 0 auto; padding: 1.5rem 1rem; padding-bottom: 100px; }
    .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .brand { text-align: center; margin-bottom: 2rem; position: relative; }
    .brand h1 { font-size: 2rem; margin-bottom: 0.5rem; font-weight: 700; letter-spacing: -0.02em; }
    .brand p { color: var(--muted); font-size: 0.875rem; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .tab { flex: 1; padding: 0.875rem; background: transparent; border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; color: var(--muted); cursor: pointer; font-size: 0.9375rem; font-weight: 500; transition: all 0.2s; }
    .tab.active { background: rgba(20,184,166,0.15); border-color: var(--accent); color: var(--fg); }
    input, textarea { width: 100%; padding: 1rem 1.25rem; margin-bottom: 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: var(--fg); font-size: 1rem; transition: all 0.2s; }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); background: rgba(255,255,255,0.08); }
    button[type="submit"] { width: 100%; padding: 1rem; background: var(--accent); color: #000; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: var(--danger); margin-top: 0.75rem; font-size: 0.875rem; padding: 0.5rem; background: rgba(239,68,68,0.1); border-radius: 8px; }
    .hidden { display: none !important; }
    .nav { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 0.5rem; overflow-x: auto; }
    .nav-btn { flex: 1; padding: 0.875rem; background: transparent; border: none; color: var(--muted); cursor: pointer; border-radius: 10px; font-size: 0.9375rem; font-weight: 500; transition: all 0.2s; position: relative; white-space: nowrap; }
    .nav-btn.active { color: var(--fg); }
    .nav-btn.active::after { content: ''; position: absolute; bottom: -0.5rem; left: 25%; right: 25%; height: 2px; background: var(--accent); border-radius: 2px; }
    .panel { display: none; animation: fadeIn 0.3s ease; }
    .panel.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .item { background: rgba(255,255,255,0.04); padding: 1rem 1.25rem; border-radius: 12px; margin-bottom: 0.875rem; border: 1px solid rgba(255,255,255,0.08); cursor: pointer; transition: all 0.2s; }
    .item:hover { background: rgba(255,255,255,0.08); border-color: rgba(20,184,166,0.3); }
    .item h4 { font-size: 1rem; font-weight: 500; margin-bottom: 0.375rem; display: flex; align-items: center; gap: 0.5rem; }
    .item h4 .badge { font-size: 0.625rem; padding: 0.125rem 0.375rem; background: rgba(20,184,166,0.2); color: var(--accent); border-radius: 4px; text-transform: uppercase; }
    .item p { color: var(--muted); font-size: 0.875rem; line-height: 1.4; }
    .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; width: 100%; max-width: 500px; max-height: 90vh; overflow: hidden; }
    .modal-header { padding: 1.25rem; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-between; align-items: center; }
    .modal-close { background: none; border: none; color: var(--muted); font-size: 1.5rem; cursor: pointer; }
    .modal-body { padding: 1.25rem; overflow-y: auto; max-height: 60vh; }
    .modal-footer { padding: 1rem 1.25rem; border-top: 1px solid rgba(255,255,255,0.08); display: flex; gap: 0.75rem; }
    .modal-btn { flex: 1; padding: 0.875rem; border-radius: 10px; border: none; font-size: 0.9375rem; font-weight: 500; cursor: pointer; }
    .modal-btn.primary { background: var(--accent); color: #000; }
    .modal-btn.secondary { background: rgba(255,255,255,0.05); color: var(--fg); border: 1px solid rgba(255,255,255,0.1); }
    .transcript-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 1rem; font-size: 0.9375rem; line-height: 1.6; min-height: 100px; white-space: pre-wrap; }
    .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(30,30,30,0.95); color: var(--fg); padding: 0.875rem 1.5rem; border-radius: 10px; font-size: 0.9375rem; opacity: 0; transition: all 0.3s; z-index: 200; border: 1px solid rgba(255,255,255,0.1); }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .workspace-selector { display: flex; gap: 0.5rem; margin-bottom: 1rem; overflow-x: auto; }
    .workspace-chip { padding: 0.5rem 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; font-size: 0.875rem; cursor: pointer; white-space: nowrap; }
    .workspace-chip.active { background: var(--accent); color: #000; border-color: var(--accent); }
    .graph-container { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; height: 300px; position: relative; overflow: hidden; margin-bottom: 1rem; }
    .graph-placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--muted); }
    .backlinks { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); }
    .backlinks h4 { color: var(--accent); margin-bottom: 0.75rem; font-size: 0.875rem; }
    .action-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 0.5rem; }
    .action-item input[type="checkbox"] { width: 18px; height: 18px; margin: 0; }
    .status-badge { display: inline-block; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 500; text-transform: uppercase; }
    .status-scheduled { background: rgba(251,191,36,0.2); color: #fbbf24; }
    .status-completed { background: rgba(20,184,166,0.2); color: var(--accent); }
    .status-recording { background: rgba(239,68,68,0.2); color: var(--danger); }
    .invite-box { background: rgba(20,184,166,0.1); border: 1px solid rgba(20,184,166,0.3); border-radius: 8px; padding: 1rem; margin: 1rem 0; }
    .invite-box code { display: block; font-size: 0.75rem; margin-top: 0.5rem; word-break: break-all; color: var(--accent); }
    .logout { position: absolute; top: 0; right: 0; padding: 0.5rem 0.875rem; background: transparent; border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: var(--muted); font-size: 0.8125rem; cursor: pointer; }
    .logout:hover { color: var(--danger); border-color: var(--danger); }
    
    /* ========== BAS-KONUŞ WIDGET ========== */
    .voice-widget {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: var(--widget-size);
      height: var(--widget-size);
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(20,184,166,0.4), 0 0 0 4px rgba(20,184,166,0.1);
      transition: all 0.3s ease;
    }
    .voice-widget:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 30px rgba(20,184,166,0.5), 0 0 0 6px rgba(20,184,166,0.15);
    }
    .voice-widget:active {
      transform: scale(0.95);
    }
    .voice-widget.recording {
      background: var(--danger);
      box-shadow: 0 4px 20px rgba(239,68,68,0.4), 0 0 0 4px rgba(239,68,68,0.1);
      animation: pulse-widget 1.2s infinite;
    }
    @keyframes pulse-widget {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .voice-widget svg {
      width: 32px;
      height: 32px;
      fill: #000;
    }
    .voice-widget.recording svg {
      fill: #fff;
    }
    
    /* Widget Menü */
    .widget-menu {
      position: fixed;
      bottom: 100px;
      right: 20px;
      background: rgba(30,30,30,0.95);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 0.5rem;
      z-index: 998;
      display: none;
      flex-direction: column;
      gap: 0.5rem;
      backdrop-filter: blur(10px);
      min-width: 180px;
    }
    .widget-menu.active { display: flex; animation: slideUp 0.2s ease; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .widget-menu-item {
      padding: 0.75rem 1rem;
      background: transparent;
      border: none;
      color: var(--fg);
      text-align: left;
      cursor: pointer;
      border-radius: 10px;
      font-size: 0.9375rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      transition: all 0.2s;
    }
    .widget-menu-item:hover { background: rgba(255,255,255,0.08); }
    .widget-menu-item .icon { font-size: 1.25rem; }
    
    /* Ses Tanıma Modal */
    .voice-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.9);
      z-index: 1001;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 2rem;
    }
    .voice-modal.active { display: flex; }
    .voice-wave {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      margin-bottom: 2rem;
      animation: voice-pulse 1s infinite;
    }
    @keyframes voice-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }
    .voice-modal.recording .voice-wave {
      background: var(--danger);
      animation: voice-recording 0.5s infinite alternate;
    }
    @keyframes voice-recording {
      from { transform: scale(1); }
      to { transform: scale(1.15); }
    }
    .voice-text {
      font-size: 1.25rem;
      text-align: center;
      color: var(--muted);
      max-width: 400px;
      min-height: 60px;
    }
    .voice-hint {
      margin-top: 1rem;
      font-size: 0.875rem;
      color: var(--muted);
    }
    .voice-close {
      position: absolute;
      top: 2rem;
      right: 2rem;
      background: rgba(255,255,255,0.1);
      border: none;
      color: var(--fg);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      font-size: 1.5rem;
      cursor: pointer;
    }
    
    /* Komut Sonuçları */
    .command-result {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(30,30,30,0.98);
      border: 1px solid rgba(20,184,166,0.3);
      border-radius: 20px;
      padding: 2rem;
      z-index: 1002;
      display: none;
      min-width: 300px;
      max-width: 90vw;
      text-align: center;
    }
    .command-result.active { display: block; animation: popIn 0.3s ease; }
    @keyframes popIn {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }
    .command-result h3 { color: var(--accent); margin-bottom: 1rem; }
    .command-result p { color: var(--muted); margin-bottom: 1.5rem; }
    .command-result .actions { display: flex; gap: 0.75rem; justify-content: center; }
    
    /* PWA Install Banner */
    .install-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(20,184,166,0.95);
      color: #000;
      padding: 1rem;
      z-index: 1003;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .install-banner.active { display: flex; }
    .install-banner button {
      background: #000;
      color: var(--accent);
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- PWA Install Banner -->
  <div id="install-banner" class="install-banner">
    <span>📱 Rawy'yi ana ekrana ekle</span>
    <div>
      <button onclick="installPWA()">Ekle</button>
      <button onclick="dismissInstall()" style="background:transparent;color:#000">✕</button>
    </div>
  </div>

  <!-- Voice Widget (Bas-Konuş) -->
  <button id="voice-widget" class="voice-widget" onclick="toggleWidgetMenu()">
    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg>
  </button>
  
  <!-- Widget Menü -->
  <div id="widget-menu" class="widget-menu">
    <button class="widget-menu-item" onclick="startVoiceCommand('note')">
      <span class="icon">📝</span> Hızlı Not
    </button>
    <button class="widget-menu-item" onclick="startVoiceCommand('reminder')">
      <span class="icon">⏰</span> Hatırlatıcı
    </button>
    <button class="widget-menu-item" onclick="startVoiceCommand('task')">
      <span class="icon">✅</span> Görev Ekle
    </button>
    <button class="widget-menu-item" onclick="startVoiceCommand('command')">
      <span class="icon">🎙️</span> Sesli Komut
    </button>
  </div>
  
  <!-- Ses Tanıma Modal -->
  <div id="voice-modal" class="voice-modal">
    <button class="voice-close" onclick="stopVoiceRecognition()">✕</button>
    <div class="voice-wave" id="voice-wave">🎙️</div>
    <div class="voice-text" id="voice-text">Dinleniyor...</div>
    <div class="voice-hint">"Yarın saat 9'da toplantım var" veya "Su içmeyi unutma"</div>
  </div>
  
  <!-- Komut Sonuç Modal -->
  <div id="command-result" class="command-result">
    <h3 id="result-title">✅ Tamamlandı</h3>
    <p id="result-text">Not kaydedildi</p>
    <div class="actions">
      <button class="modal-btn secondary" onclick="closeCommandResult()">Kapat</button>
      <button class="modal-btn primary" onclick="continueListening()">Devam Et</button>
    </div>
  </div>

  <div id="loading" class="loading-overlay"><div class="spinner"></div></div>
  
  <div class="container">
    <div id="auth-view" class="hidden">
      <div class="brand"><h1>Rawy</h1><p>Sesli asistanın</p></div>
      <div class="tabs">
        <button class="tab active" onclick="showTab('login')">Giriş</button>
        <button class="tab" onclick="showTab('register')">Kayıt</button>
      </div>
      <form id="login-form" onsubmit="return doLogin(event)">
        <input type="email" id="login-email" placeholder="Email" required>
        <input type="password" id="login-pass" placeholder="Şifre" required>
        <button type="submit" id="login-btn">Giriş Yap</button>
        <div id="login-error" class="error hidden"></div>
      </form>
      <form id="register-form" class="hidden" onsubmit="return doRegister(event)">
        <input type="email" id="reg-email" placeholder="Email" required>
        <input type="password" id="reg-pass" placeholder="Şifre (min 6)" minlength="6" required>
        <button type="submit" id="reg-btn">Kayıt Ol</button>
        <div id="reg-error" class="error hidden"></div>
      </form>
    </div>
    
    <div id="app-view" class="hidden">
      <button class="logout" onclick="doLogout()">Çıkış</button>
      <div class="brand"><h1>Rawy</h1><p id="user-info">-</p></div>
      <div class="nav">
        <button class="nav-btn active" onclick="showPanel('calendar')">Ajanda</button>
        <button class="nav-btn" onclick="showPanel('voice')">Sesler</button>
        <button class="nav-btn" onclick="showPanel('reminders')">Hatırlatıcılar</button>
        <button class="nav-btn" onclick="showPanel('tasks')">Görevler</button>
        <button class="nav-btn" onclick="showPanel('graph')">Graph</button>
      </div>
      
      <div id="calendar-panel" class="panel active">
        <div class="panel-header"><h2>Ajanda</h2><button class="modal-btn secondary" onclick="refreshData()">Yenile</button></div>
        <div id="calendar-list"><div class="empty"><p>Yükleniyor...</p></div></div>
      </div>
      
      <div id="voice-panel" class="panel">
        <div class="recorder-container">
          <button class="record-btn" id="rec-btn" onmousedown="startRec()" onmouseup="stopRec()" ontouchstart="startRec()" ontouchend="stopRec()">
            <div class="record-inner">🎙️</div>
          </button>
          <p class="rec-hint">Basılı tut, konuş, bırak</p>
          <div id="status"></div>
        </div>
        <div id="voice-list"></div>
      </div>
      
      <div id="reminders-panel" class="panel">
        <div class="panel-header"><h2>Hatırlatıcılar</h2><button class="modal-btn primary" onclick="startVoiceCommand('reminder')">+ Yeni</button></div>
        <div id="reminders-list"><div class="empty"><p>Yükleniyor...</p></div></div>
      </div>
      
      <div id="tasks-panel" class="panel">
        <div class="panel-header"><h2>Görevler</h2><button class="modal-btn primary" onclick="startVoiceCommand('task')">+ Yeni</button></div>
        <div id="tasks-list"><div class="empty"><p>Yükleniyor...</p></div></div>
      </div>
      
      <div id="graph-panel" class="panel">
        <div class="panel-header"><h2>Knowledge Graph</h2></div>
        <div class="graph-container" id="graph-viz"><div class="graph-placeholder">Yükleniyor...</div></div>
      </div>
    </div>
  </div>
  
  <div id="toast" class="toast"></div>
  
  <script>
    // ========== GLOBALS ==========
    const API = window.location.origin;
    let token = localStorage.getItem('token');
    let recognition = null;
    let isRecording = false;
    let deferredPrompt = null;
    
    // ========== INIT ==========
    window.onload = () => {
      setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
        if (token) showApp(); else showAuth();
      }, 500);
      
      // PWA install event
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('install-banner').classList.add('active');
      });
      
      // Service Worker kaydet
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/static/service-worker.js')
          .then(() => console.log('SW registered'))
          .catch(console.error);
      }
      
      // Speech API kontrol
      if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        setupSpeechRecognition();
      }
    };
    
    // ========== PWA ==========
    function installPWA() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => {
          deferredPrompt = null;
          document.getElementById('install-banner').classList.remove('active');
        });
      }
    }
    
    function dismissInstall() {
      document.getElementById('install-banner').classList.remove('active');
      localStorage.setItem('install-dismissed', 'true');
    }
    
    // ========== WIDGET ==========
    function toggleWidgetMenu() {
      const menu = document.getElementById('widget-menu');
      menu.classList.toggle('active');
    }
    
    function startVoiceCommand(type) {
      document.getElementById('widget-menu').classList.remove('active');
      document.getElementById('voice-modal').classList.add('active');
      document.getElementById('voice-modal').dataset.type = type;
      
      const hints = {
        'note': 'Notunuzu söyleyin...',
        'reminder': '"Yarın saat 9\\'da toplantıyı hatırlat"',
        'task': '"Salı günü raporu bitir"',
        'command': 'Komutunuzu söyleyin...'
      };
      document.querySelector('.voice-hint').textContent = hints[type] || 'Konuşmaya başlayın...';
      
      startSpeechRecognition();
    }
    
    // ========== SPEECH RECOGNITION ==========
    function setupSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = 'tr-TR';
      recognition.continuous = false;
      recognition.interimResults = true;
      
      recognition.onresult = (e) => {
        let transcript = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          transcript += e.results[i][0].transcript;
        }
        document.getElementById('voice-text').textContent = transcript;
      };
      
      recognition.onend = () => {
        const text = document.getElementById('voice-text').textContent;
        if (text && text !== 'Dinleniyor...') {
          processVoiceCommand(text);
        }
        document.getElementById('voice-modal').classList.remove('recording');
      };
    }
    
    function startSpeechRecognition() {
      if (!recognition) {
        showToast('Tarayıcınız ses tanımayı desteklemiyor', 'error');
        return;
      }
      
      document.getElementById('voice-text').textContent = 'Dinleniyor...';
      document.getElementById('voice-modal').classList.add('recording');
      isRecording = true;
      
      try {
        recognition.start();
      } catch(e) {
        // Zaten başlamışsa durdur yeniden başlat
        recognition.stop();
        setTimeout(() => recognition.start(), 100);
      }
    }
    
    function stopVoiceRecognition() {
      if (recognition && isRecording) {
        recognition.stop();
      }
      document.getElementById('voice-modal').classList.remove('active');
      document.getElementById('voice-modal').classList.remove('recording');
      isRecording = false;
    }
    
    // ========== COMMAND PROCESSING ==========
    async function processVoiceCommand(text) {
      const type = document.getElementById('voice-modal').dataset.type;
      document.getElementById('voice-modal').classList.remove('active');
      
      showToast('İşleniyor...');
      
      try {
        let endpoint, body, successMsg;
        
        if (type === 'note' || type === 'command') {
          // Ses kaydı olarak gönder
          endpoint = '/voice/process-text';
          body = { text, timezone: 'Europe/Istanbul' };
          successMsg = 'Not kaydedildi!';
        } else if (type === 'reminder') {
          // Hatırlatıcı oluştur
          endpoint = '/reminders/voice';
          body = { text, timezone: 'Europe/Istanbul' };
          successMsg = 'Hatırlatıcı kuruldu!';
        } else if (type === 'task') {
          // Görev oluştur
          endpoint = '/tasks/voice';
          body = { text, timezone: 'Europe/Istanbul' };
          successMsg = 'Görev eklendi!';
        }
        
        // API çağrısı (eğer endpoint varsa)
        if (endpoint) {
          const res = await fetch(API + endpoint, {
            method: 'POST',
            headers: {
              'Authorization': 'Bearer ' + token,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(body)
          });
          
          if (res.ok) {
            showSuccessResult(successMsg, text);
            refreshData();
          } else {
            throw new Error('API error');
          }
        }
      } catch(e) {
        // Fallback: Ses metnini ses kaydı olarak kaydet
        showSuccessResult('Not kaydedildi (işlenecek)', text);
      }
    }
    
    function showSuccessResult(title, text) {
      document.getElementById('result-title').textContent = '✅ ' + title;
      document.getElementById('result-text').textContent = text;
      document.getElementById('command-result').classList.add('active');
    }
    
    function closeCommandResult() {
      document.getElementById('command-result').classList.remove('active');
    }
    
    function continueListening() {
      closeCommandResult();
      startVoiceCommand('command');
    }
    
    // ========== AUTH ==========
    function showAuth() {
      document.getElementById('auth-view').classList.remove('hidden');
      document.getElementById('app-view').classList.add('hidden');
      document.getElementById('voice-widget').classList.add('hidden');
    }
    
    async function showApp() {
      document.getElementById('auth-view').classList.add('hidden');
      document.getElementById('app-view').classList.remove('hidden');
      document.getElementById('voice-widget').classList.remove('hidden');
      
      try {
        const res = await fetch(API + '/auth/me', {headers: {'Authorization': 'Bearer ' + token}});
        const user = await res.json();
        document.getElementById('user-info').textContent = user.email + ' · ' + user.plan;
      } catch(e) {}
      
      refreshData();
    }
    
    async function doLogin(e) {
      e.preventDefault();
      try {
        const res = await fetch(API + '/auth/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-pass').value
          })
        });
        if(!res.ok) throw new Error();
        const data = await res.json();
        token = data.access_token;
        localStorage.setItem('token', token);
        showToast('Giriş başarılı!');
        showApp();
      } catch(err) {
        document.getElementById('login-error').textContent = 'Giriş başarısız';
        document.getElementById('login-error').classList.remove('hidden');
      }
      return false;
    }
    
    async function doRegister(e) {
      e.preventDefault();
      try {
        let res = await fetch(API + '/auth/register', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            email: document.getElementById('reg-email').value,
            password: document.getElementById('reg-pass').value
          })
        });
        if(!res.ok) throw new Error();
        
        res = await fetch(API + '/auth/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            email: document.getElementById('reg-email').value,
            password: document.getElementById('reg-pass').value
          })
        });
        const data = await res.json();
        token = data.access_token;
        localStorage.setItem('token', token);
        showToast('Kayıt başarılı!');
        showApp();
      } catch(err) {
        document.getElementById('reg-error').textContent = 'Kayıt başarısız';
        document.getElementById('reg-error').classList.remove('hidden');
      }
      return false;
    }
    
    function doLogout() {
      token = null;
      localStorage.removeItem('token');
      location.reload();
    }
    
    // ========== UI ==========
    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
      document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
    }
    
    function showPanel(panel) {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById(panel + '-panel').classList.add('active');
      
      if (panel === 'reminders') loadReminders();
      if (panel === 'tasks') loadTasks();
    }
    
    function showToast(msg, type='success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show ' + type;
      setTimeout(() => t.classList.remove('show'), 3000);
    }
    
    // ========== DATA LOADING ==========
    async function loadCalendar() {
      const list = document.getElementById('calendar-list');
      try {
        const res = await fetch(API + '/calendar/', {headers: {'Authorization': 'Bearer ' + token}});
        const data = await res.json();
        const days = Array.isArray(data) ? data : (data.days || []);
        if(!days.length) {
          list.innerHTML = '<div class="empty"><p>Ajanda boş</p></div>';
          return;
        }
        list.innerHTML = days.slice(0, 7).map(d => 
          `<div class="item"><h4>${new Date(d.date).toLocaleDateString('tr-TR', {weekday:'long', day:'numeric', month:'short'})}</h4>${(d.blocks || []).map(b => `<p>${(b.start_time || '--:--').slice(0,5)} — ${b.title}</p>`).join('')}</div>`
        ).join('');
      } catch(e) { list.innerHTML = '<div class="empty"><p>Hata</p></div>'; }
    }
    
    async function loadVoices() {
      const list = document.getElementById('voice-list');
      try {
        const res = await fetch(API + '/voice/', {headers: {'Authorization': 'Bearer ' + token}});
        const data = await res.json();
        const items = data.items || [];
        if(!items.length) {
          list.innerHTML = '<div class="empty"><p>Henüz ses kaydı yok</p></div>';
          return;
        }
        list.innerHTML = items.slice(0, 10).map(v => 
          `<div class="item"><h4>${v.title || 'İsimsiz Not'}</h4><p>${v.preview || '...'}</p></div>`
        ).join('');
      } catch(e) { list.innerHTML = '<div class="empty"><p>Hata</p></div>'; }
    }
    
    async function loadReminders() {
      const list = document.getElementById('reminders-list');
      try {
        const res = await fetch(API + '/reminders/', {headers: {'Authorization': 'Bearer ' + token}});
        const data = await res.json();
        const reminders = [...data.upcoming, ...data.today];
        if(!reminders.length) {
          list.innerHTML = '<div class="empty"><p>Aktif hatırlatıcı yok</p></div>';
          return;
        }
        list.innerHTML = reminders.slice(0, 10).map(r => 
          `<div class="item"><h4>⏰ ${r.title}</h4><p>${new Date(r.remind_at).toLocaleString('tr-TR')}</p></div>`
        ).join('');
      } catch(e) { list.innerHTML = '<div class="empty"><p>Hata</p></div>'; }
    }
    
    async function loadTasks() {
      const list = document.getElementById('tasks-list');
      try {
        const res = await fetch(API + '/tasks/', {headers: {'Authorization': 'Bearer ' + token}});
        const data = await res.json();
        if(!data.length) {
          list.innerHTML = '<div class="empty"><p>Görev yok</p></div>';
          return;
        }
        list.innerHTML = data.slice(0, 10).map(t => 
          `<div class="item" style="${t.done ? 'opacity:0.5;text-decoration:line-through' : ''}"><h4>${t.done ? '✅' : '⭕'} ${t.title}</h4>${t.due_at ? `<p>📅 ${new Date(t.due_at).toLocaleString('tr-TR')}</p>` : ''}</div>`
        ).join('');
      } catch(e) { list.innerHTML = '<div class="empty"><p>Hata</p></div>'; }
    }
    
    async function loadGraph() {
      // Basit implementasyon
      document.getElementById('graph-viz').innerHTML = '<div class="graph-placeholder">Graph hazırlanıyor...</div>';
    }
    
    function refreshData() {
      loadCalendar();
      loadVoices();
      loadReminders();
      loadTasks();
      showToast('Yenilendi');
    }
    
    // ========== AUDIO RECORDING ==========
    async function startRec() {
      const btn = document.getElementById('rec-btn');
      const status = document.getElementById('status');
      try {
        const stream = await navigator.mediaDevices.getUserMedia({audio: true});
        recorder = new MediaRecorder(stream);
        chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = async () => {
          const blob = new Blob(chunks, {type: 'audio/webm'});
          status.textContent = 'Yükleniyor...';
          try {
            const formData = new FormData();
            formData.append('file', blob, 'kayit.webm');
            await fetch(API + '/voice/upload', {
              method: 'POST',
              headers: {'Authorization': 'Bearer ' + token},
              body: formData
            });
            status.textContent = '';
            showToast('Kayıt yüklendi!');
            setTimeout(loadVoices, 500);
          } catch(err) {
            status.textContent = 'Hata!';
            showToast('Yükleme başarısız', 'error');
          }
        };
        recorder.start();
        btn.classList.add('recording');
        status.textContent = 'Kaydediyor...';
      } catch(err) {
        showToast('Mikrofon erişimi yok', 'error');
      }
    }
    
    function stopRec() {
      const btn = document.getElementById('rec-btn');
      if(recorder && recorder.state === 'recording') {
        recorder.stop();
        btn.classList.remove('recording');
        recorder.stream.getTracks().forEach(t => t.stop());
      }
    }
  </script>
</body>
