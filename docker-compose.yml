services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: rawy
      POSTGRES_PASSWORD: rawy
      POSTGRES_DB: rawy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rawy -d rawy"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
